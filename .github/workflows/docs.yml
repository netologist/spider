name: Deploy Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements-docs.txt
      - name: Build MkDocs
        run: mkdocs build
      - name: Smoke-test install.sh
        run: >-
          bash install.sh
          --harness agents
          --scope global
          --dry-run
          --cache-dir "$GITHUB_WORKSPACE"
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./site
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
