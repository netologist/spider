name: debugging-agent
skill: spider-debug
isolated_context: true
model_tier: opus-tier
description: >-
  Kicks in when the Quality Gate fails 2+ times for the same reason.
  Runs the disciplined diagnosing-bugs loop (reproduce → minimise →
  hypothesise → instrument → fix → regression-test) in an isolated
  context, separate from the Execute loop it was stuck in. Enters
  the gate-retry counter separately from normal Execute retries.
trigger: Quality Gate fails a second time for the same reason
  (post-gate.sh exit code 2 — escalate)
